<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Officers</title>
    <link rel="stylesheet" href="styles/aws practice.css" />
  </head>

  <body>
    
    <div class="officerList-container">
    </div>
    <div class="Back-button">
      <a href="http://127.0.0.1:5500/aws%20practice.html">Go Back</a>
    </div>
    <script>
      fetch("officerList.json")
        .then((res) => res.json())
        .then((members) => {
          const container = document.querySelector(".officerList-container");
          members.forEach((member) => {
          container.innerHTML += `
        <div class="officer-card">
          <h3>${member.name}</h3>
          <p>${member.role}</p>
        </div>
      `;
          });
        });
    </script>
  </body>
</html>
