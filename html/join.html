<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join US</title>
    <link rel="stylesheet" href="../styles/landing_page.css" />
  </head>
  <body>
    <div class="form-container">
      <form>
        <label class="FN" for="firstName">First Name: </label>
        <input
          class="FN-box"
          type="text"
          id="firstName"
          placeholder="Enter your first name"
          required
        />
        <br />
        <label class="LN" for="LastName">Last Name: </label>
        <input
          class="LN-box"
          type="text"
          id="LastName"
          placeholder="Enter your last name"
          required
        />
        <br />
        <label for="email">Email: </label>
        <input
          class="E-box"
          type="text"
          id="email"
          placeholder="email@gmail.com"
          required
        />
        <br />
        <div class="form-buttons">
          <input class="reset-button" type="reset" />
          <input class="submit-button" type="submit" />
        </div>
        <br />
      </form>
    </div>
    <div class="Back-button">
      <a href="http://127.0.0.1:5500/html/landing_page.html">Go Back</a>
    </div>
  </body>
</html>
