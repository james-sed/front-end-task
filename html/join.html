<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join US</title>
    <link rel="stylesheet" href="../styles/landing_page.css" />
  </head>
  <body>
    <div class="form-container">
      <form>
        <label for="firstName">First Name: </label>
        <input
          type="text"
          id="firstName"
          placeholder="Enter your first name"
          required
        />
        <br />
        <label for="LastName">Last Name: </label>
        <input
          type="text"
          id="LastName"
          placeholder="Enter your last name"
          required
        />
        <br />
        <label for="email">Email: </label>
        <input type="text" id="email" placeholder="email@gmail.com" required />
        <br />
        <div class="form-buttons">
          <input type="reset" />
          <input type="submit" />
        </div>
        <br />
      </form>
    </div>
    <div class="join-result-container">
      <div class="join-header">
        <h1 class="joinResult">
          Thank you for your interest in joining! We will keep you updated.
        </h1>
      </div>
    </div>
    <div class="Back-button">
      <a href="http://127.0.0.1:5500/html/landing_page.html">Go Back</a>
    </div>
  </body>
</html>
